<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Login</title>

  <link rel="stylesheet" href="./sign-up-login-form/dist/style.css">

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#573b8a">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
</head>
<body>

<button id="installBtn" style="
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 18px;
  background:#573b8a;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  font-weight:600;
">
  Install App
</button>

<div class="main">
  <form onsubmit="return loginUser(event)">
    <label>Teacher Login</label>
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button type="submit">Login</button>
    <a href="./student-login.html">Student Login</a>
  </form>
</div>

<script src="./sign-up-login-form/dist/login.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        const reg = await navigator.serviceWorker.register("./sw.js");
        console.log("SW registered:", reg.scope);
      } catch (err) {
        console.error("SW registration failed:", err);
      }
    });
  }

  let deferredPrompt = null;
  const installBtn = document.getElementById("installBtn");

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = "block";
    console.log("beforeinstallprompt fired");
  });

  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) {
      alert("Install prompt not available yet. Try browser menu → Install app.");
      return;
    }

    const result = await deferredPrompt.prompt();
    console.log("Install result:", result?.outcome);
    deferredPrompt = null;
    installBtn.style.display = "none";
  });

  window.addEventListener("appinstalled", () => {
    console.log("PWA installed");
    installBtn.style.display = "none";
  });
</script>

</body>
</html>
