<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <link rel="stylesheet" href="./sign-up-login-form/dist/style.css">
</head>
<body>

<div class="main">
    <form onsubmit="return studentLogin(event)">
        <label>Student Login</label>
        <input type="email" id="student-email" placeholder="Email" required>
        <input type="password" id="student-password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script src="./sign-up-login-form/dist/student-login.js"></script>

</body>
</html>
