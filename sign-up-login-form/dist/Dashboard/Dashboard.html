<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Dashboard</title>
    <link rel="stylesheet" href="Dashboard.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Student Marks Analysis</h1>
            <div class="overview-stats">
                <div class="stat-card">
                    <h3>Total Subjects</h3>
                    <p id="totalSubjects">0</p>
                </div>
                <div class="stat-card">
                    <h3>Average Score</h3>
                    <p id="averageScore">0%</p>
                </div>
                <div class="stat-card">
                    <h3>Highest Score</h3>
                    <p id="highestScore">0%</p>
                </div>
            </div>
        </header>

        <main>
            <section class="performance-chart">
                <h2>Subject-wise Performance</h2>
                <div class="bar-chart"></div>
            </section>
        
            <section class="student-list">
                <h2>Student Details</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Subject Name</th>
                            <th>Lecture Attended</th>
                            <th>Unit Test</th>
                            <th>Oral Practical</th>
                            <th>Mean</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="Dashboard.js"></script>
</body>
</html>
