<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="Home.css">
    <link rel="stylesheet" href="../Header/Header.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="container">
        <main>
            <section class="add-student">
                <h2>Students List</h2>
                <button id="addStudentBtn">+ Add Student</button>
            </section>

            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Roll No.</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Marks</th>
                            <th>Analysis</th>
                            <th>Edit</th>
                            <th>Reset Password</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        <tr>
                            <td colspan="9">Loading students...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal" id="studentModal">
        <div class="modal-content">
            <h2>Add Student</h2>
            <input type="text" id="studentName" placeholder="Enter Student Name">
            <input type="email" id="studentEmail" placeholder="Enter Student Email">
            <input type="text" id="rollnumber" placeholder="Enter Student Roll No.">
            <input type="password" id="studentPassword" placeholder="Enter Default Password">

            <div class="modal-buttons">
                <button id="saveStudentBtn">Save</button>
                <button id="closeModalBtn" type="button">Close</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editStudentModal">
        <div class="modal-content">
            <h2>Edit Student</h2>
            <input type="text" id="editStudentName" placeholder="Student Name">
            <input type="email" id="editStudentEmail" placeholder="Student Email">
            <input type="text" id="editStudentRoll" readonly>

            <div class="modal-buttons">
                <button id="updateStudentBtn">Update</button>
                <button id="closeEditModalBtn" type="button">Close</button>
            </div>
        </div>
    </div>

    <div class="modal" id="resetPasswordModal">
        <div class="modal-content">
            <h2>Reset Student Password</h2>
            <input type="text" id="resetStudentRoll" readonly>
            <input type="password" id="resetStudentPassword" placeholder="Enter New Password">

            <div class="modal-buttons">
                <button id="confirmResetPasswordBtn">Reset</button>
                <button id="closeResetModalBtn" type="button">Close</button>
            </div>
        </div>
    </div>

    <script src="Home.js"></script>
</body>
</html>
